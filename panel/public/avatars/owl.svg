  <line x1="291" y1="458" x2="288" y2="474" stroke="#c88820" stroke-width="5" stroke-linecap="round"/>
  <line x1="308" y1="455" x2="310" y2="471" stroke="#c88820" stroke-width="5" stroke-linecap="round"/>
