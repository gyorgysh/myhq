<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#eef0f8"/>
  <!-- Body -->
  <rect x="168" y="285" width="176" height="160" rx="20" fill="#5b7ad4"/>
