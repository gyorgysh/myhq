  <rect x="120" y="400" width="51" height="30" rx="14" fill="#4a65b8"/>
  <rect x="341" y="400" width="51" height="30" rx="14" fill="#4a65b8"/>
  <!-- Legs -->
  <rect x="188" y="440" width="56" height="52" rx="16" fill="#4a65b8"/>
  <rect x="268" y="440" width="56" height="52" rx="16" fill="#4a65b8"/>
