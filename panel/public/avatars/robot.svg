  <rect x="202" y="198" width="36" height="26" rx="7" fill="#38bdf8" opacity="0.85"/>
  <rect x="274" y="198" width="36" height="26" rx="7" fill="#38bdf8" opacity="0.85"/>
  <!-- Eye pupils -->
  <circle cx="220" cy="211" r="8" fill="#0ea5e9"/>
  <circle cx="292" cy="211" r="8" fill="#0ea5e9"/>
  <circle cx="222" cy="209" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="294" cy="209" r="3" fill="#fff" opacity="0.8"/>
  <!-- Mouth panel -->
  <rect x="218" y="248" width="76" height="14" rx="6" fill="#1a1a2e"/>
  <rect x="222" y="251" width="12" height="8" rx="3" fill="#38bdf8"/>
  <rect x="238" y="251" width="12" height="8" rx="3" fill="#38bdf8"/>
  <rect x="254" y="251" width="12" height="8" rx="3" fill="#38bdf8"/>
  <rect x="270" y="251" width="12" height="8" rx="3" fill="#38bdf8"/>
  <!-- Arms -->
  <rect x="118" y="290" width="55" height="130" rx="20" fill="#5b7ad4"/>
