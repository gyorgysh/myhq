  <rect x="200" y="310" width="112" height="50" rx="10" fill="#4a65b8"/>
  <!-- Chest lights -->
  <circle cx="222" cy="336" r="10" fill="#a3e6ff"/>
  <circle cx="256" cy="336" r="10" fill="#ff9eb5"/>
  <circle cx="290" cy="336" r="10" fill="#b3f0a0"/>
  <!-- Waist -->
  <rect x="200" y="278" width="112" height="20" rx="8" fill="#4a65b8"/>
